<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartPark — Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Smart<span>Park</span></div>
    <p class="auth-sub">Create your SmartPark account</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@csu.fullerton.edu"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-auth">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</body>
</html>
